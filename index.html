<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DTM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffee;
  --editorbg: #eee0d6;
  --surface: #ffffee;
  --surface2: #f2deba;
  --surface3: #954035;
  --border: #e5ddd0;
  --primary: #6c8cff;
  --primary-dim: #4a6ae0;
  --text: #333333;
  --text2: #7a1007;
  --text3: #5d6175;
  --danger: #ff5c6a;
  --success: #4ecb71;
  --accent: #b48eff;
  --warning: #ffb347;
  --folder: #ffcc02;
  --toolbar-w: 48px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}

.app-container { display: flex; height: 100dvh; overflow: hidden; }

/* ツールバー */
.toolbar {
  width: var(--toolbar-w); min-width: var(--toolbar-w);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; gap: 6px; flex-shrink: 0;
  overflow-y: auto; overflow-x: hidden;
}
.toolbar-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; font-size: 16px; flex-shrink: 0;
}
.toolbar-btn:hover { background: var(--surface3); color: var(--text); }
.toolbar-btn:active { transform: scale(0.9); }
.toolbar-btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none; color: #fff; box-shadow: 0 2px 8px rgba(108,140,255,0.3);
}
.toolbar-btn.primary:hover { transform: scale(1.05); }
.toolbar-btn.danger { color: var(--danger); }
.toolbar-btn.copied {
  background: rgba(78,203,113,0.15); border-color: var(--success); color: var(--success);
}
.toolbar-sep { width: 24px; height: 1px; background: var(--border); margin: 2px 0; flex-shrink: 0; }

/* サイドバー */
.sidebar {
  display: flex; flex-direction: column; background: var(--bg);
  border-right: 1px solid var(--border); flex-shrink: 0;
  overflow: hidden; transition: width 0.3s ease; width: 420px;
}
.sidebar.collapsed { width: 0; min-width: 0; border-right: none; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 15px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header h1 {
  font-size: 26px; font-weight: 700; flex: 1;
  background: linear-gradient(135deg, var(--text2), var(--danger));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap; overflow: hidden;
}

/* サイドバー閉じるボタン（PC版のみ表示） */
.sidebar-close-btn {
  display: none;
}

.btn-icon {
  width: 34px; height: 34px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; font-size: 16px;
}
.btn-icon:hover { background: var(--surface2); color: var(--text); }
.btn-icon:active { transform: scale(0.93); }

/* ツリー */
.tree-container { padding: 6px 12px 20px; overflow-y: auto; flex: 1; }
.tree-children { padding-left: 24px; }
.tree-item { margin: 3px 0; position: relative; }

.tree-folder-row {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 12px 12px 10px; border-radius: 12px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  border: 2px solid transparent;
}
.tree-folder-row:hover { background: var(--surface); border-color: var(--border); }
.tree-folder-row.selected { background: rgba(255,204,2,0.08); border-color: var(--folder) !important; }

.tree-toggle {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text2);
  transition: transform 0.2s; flex-shrink: 0; border-radius: 6px;
}
.tree-toggle:hover { background: var(--surface2); }
.tree-toggle.open { transform: rotate(90deg); }

.tree-folder-icon { font-size: 22px; flex-shrink: 0; }
.tree-folder-name {
  flex: 1; font-size: 18px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-folder-count {
  font-size: 14px; color: var(--text3);
  background: var(--surface2); padding: 2px 8px; border-radius: 9px; flex-shrink: 0;
}

.tree-memo-row {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 12px 10px 10px; border-radius: 12px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  border: 2px solid transparent;
}
.tree-memo-row:hover { background: var(--surface); border-color: var(--border); }
.tree-memo-row.active { background: rgba(108,140,255,0.08); border-color: var(--primary); }

.tree-memo-icon { font-size: 20px; flex-shrink: 0; color: var(--text2); }
.tree-memo-title {
  flex: 1; font-size: 18px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-memo-badges { display: flex; gap: 5px; flex-shrink: 0; }
.tree-badge { font-size: 13px; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
.tree-badge.parent { background: rgba(255,179,71,0.15); color: var(--danger); }
.tree-badge.child { background: rgba(108,140,255,0.15); color: var(--primary); }

/* ドラッグ状態 */
.dragging > .tree-folder-row,
.dragging > .tree-memo-row {
  opacity: 0.25 !important;
  background: rgba(108,140,255,0.03) !important;
  border: 2px dashed var(--text3) !important;
}
.drop-above > .tree-folder-row,
.drop-above > .tree-memo-row {
  border-top: 3px solid var(--primary) !important;
  background: rgba(108,140,255,0.06) !important;
}
.drop-below > .tree-folder-row,
.drop-below > .tree-memo-row {
  border-bottom: 3px solid var(--primary) !important;
  background: rgba(108,140,255,0.06) !important;
}
.drop-into > .tree-folder-row {
  background: rgba(108,140,255,0.15) !important;
  border: 2px solid var(--primary) !important;
  box-shadow: inset 0 0 20px rgba(108,140,255,0.1);
}

/* ドラッグゴースト */
.drag-ghost {
  position: fixed; z-index: 99999; pointer-events: none;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 16px;
  font-size: 16px; font-weight: 600; color: var(--text);
  opacity: 0.75; box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 8px;
  max-width: 280px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  will-change: left, top;
}

/* 長押し中のフィードバック */
.long-press-active > .tree-folder-row,
.long-press-active > .tree-memo-row {
  background: rgba(108,140,255,0.1) !important;
  border-color: var(--primary-dim) !important;
  transform: scale(1.02);
  transition: all 0.15s;
}

/* 検索 */
.search-bar {
  padding: 9px 15px; flex-shrink: 0; border-top: 1px solid var(--border);
}
.search-wrap { position: relative; }
.search-wrap::before {
  content: '🔍'; position: absolute; left: 15px; top: 50%;
  transform: translateY(-50%); font-size: 20px;
}
.search-input {
  width: 100%; padding: 12px 15px 12px 48px;
  background: var(--editorbg); border: 1px solid var(--border);
  border-radius: 15px; color: var(--text); font-size: 21px;
  outline: none; transition: border 0.2s;
}
.search-input:focus { border-color: var(--primary); }

/* 下部ボタン */
.bottom-buttons {
  padding: 12px 15px; display: flex; gap: 9px; justify-content: center;
  border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.sidebar.collapsed .bottom-buttons { display: none; }

.fab-sm {
  width: 54px; height: 54px; border-radius: 16px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none; color: #fff; font-size: 30px; cursor: pointer;
  box-shadow: 0 3px 16px rgba(108,140,255,0.3);
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.fab-sm:hover { transform: scale(1.05); }
.fab-sm:active { transform: scale(0.93); }

.btn-bot {
  width: 54px; height: 54px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--editorbg);
  color: var(--text2); font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.btn-bot:hover { background: var(--surface3); color: var(--text); }
.btn-bot:active { transform: scale(0.9); }
.btn-bot.danger-fab { color: var(--danger); }

/* エディタ */
.editor-view {
  flex: 1; display: flex; flex-direction: column;
  background: var(--editorbg); min-width: 0; overflow: hidden;
}
.editor-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text2); gap: 16px; padding: 20px;
}
.editor-empty .emoji { font-size: 48px; }
.editor-empty p { font-size: 16px; text-align: center; line-height: 1.6; }

.editor-folder-info {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text2); gap: 12px; padding: 20px;
}
.editor-folder-info .folder-big-icon { font-size: 48px; }
.editor-folder-info .folder-big-name { font-size: 18px; font-weight: 700; color: var(--text2); }
.editor-folder-info .folder-big-count { font-size: 13px; color: var(--text3); }
.editor-folder-actions { display: flex; gap: 8px; margin-top: 8px; }
.editor-folder-actions button {
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.editor-folder-actions button:hover { background: var(--surface2); color: var(--text); }
.editor-folder-actions .btn-folder-delete { border-color: rgba(255,92,106,0.3); color: var(--danger); }

.editor-header {
  display: flex; align-items: center; padding: 21px 20px; gap: 8px;
  border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
}
.editor-title-input {
  flex: 1; background: none; border: none; color: var(--text2);
  font-size: 20px; font-weight: 700; outline: none;
}
.editor-title-input::placeholder { color: var(--text2); }

.editor-body { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.editor-textarea {
  flex: 1; min-height: 150px; background: none; border: none;
  color: var(--text2); font-size: 16px; line-height: 1.7;
  padding: 14px; resize: none; outline: none; font-family: inherit;
  user-select: text; -webkit-user-select: text;
}
.editor-textarea::placeholder { color: var(--text2); }

/* リンクセクション */
.links-section {
  border-top: 1px solid var(--border); padding: 10px 14px 20px; background: var(--surface);
}
.links-group { margin-bottom: 12px; }
.links-group:last-child { margin-bottom: 0; }
.links-group-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
.links-group-header h3 {
  font-size: 16px; color: var(--text2); font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.links-group-header .label-parent { color: var(--danger); }
.links-group-header .label-child { color: var(--primary); }

.btn-add-link {
  padding: 4px 10px; background: rgba(108,140,255,0.15); color: var(--primary);
  border: 1px solid rgba(108,140,255,0.3); border-radius: 6px;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-add-link:hover { background: rgba(108,140,255,0.25); }

.linked-memos { display: flex; flex-direction: column; gap: 4px; }
.linked-memo-item {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 8px; background: var(--surface2);
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.linked-memo-item:hover { background: var(--border); }
.linked-memo-item .lm-title { flex: 1; font-size: 16px; font-weight: 500; }
.linked-memo-item .lm-icon { font-size: 16px; }
.linked-memo-item .lm-remove {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: rgba(255,92,106,0.15); color: var(--danger);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
}
.linked-memo-item .lm-remove:hover { background: rgba(255,92,106,0.3); }
.no-links { text-align: center; padding: 10px; color: var(--text3); font-size: 16px; }

/* パンくず */
.breadcrumb {
  padding: 5px 14px; display: flex; align-items: center; gap: 3px;
  font-size: 12px; color: var(--text2);
  overflow-x: auto; white-space: nowrap; scrollbar-width: none; flex-shrink: 0;
}
.breadcrumb::-webkit-scrollbar { display: none; }
.breadcrumb span {
  cursor: pointer; padding: 3px 6px; border-radius: 5px;
  transition: all 0.2s; flex-shrink: 0;
}
.breadcrumb span:hover { background: var(--surface2); color: var(--text); }
.breadcrumb span.current { color: var(--primary); font-weight: 600; }
.breadcrumb .sep { cursor: default; color: var(--border); }

/* モーダル */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px; max-height: 70vh;
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto; }
.modal-header { padding: 8px 16px 12px; font-size: 16px; font-weight: 700; }
.modal-search {
  margin: 0 16px 10px; padding: 10px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
}
.modal-search:focus { border-color: var(--primary); }
.modal-list { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
.modal-item {
  padding: 12px; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; gap: 10px;
}
.modal-item:hover { background: var(--surface2); }
.modal-item.already-linked { opacity: 0.4; cursor: default; }
.modal-item .mi-icon { font-size: 18px; flex-shrink: 0; }
.modal-item .mi-title { font-size: 14px; flex: 1; }
.modal-item .mi-status { font-size: 11px; color: var(--text2); flex-shrink: 0; }

.modal-center { align-items: center; padding: 20px; }
.modal-center .modal { border-radius: 20px; max-height: 80vh; }
.modal-actions { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.btn-full {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-full:active { transform: scale(0.97); }
.btn-export { background: rgba(108,140,255,0.15); color: var(--primary); }
.btn-import { background: rgba(78,203,113,0.15); color: var(--success); }
.btn-import-clipboard { background: rgba(180,142,255,0.15); color: var(--accent); }
.btn-cancel { background: var(--editorbg); color: var(--text2); }
.btn-danger { background: rgba(255,92,106,0.1); color: var(--danger); }

.export-textarea {
  width: calc(100% - 32px); min-height: 120px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px;
  padding: 12px; margin: 0 16px; resize: vertical; outline: none; font-family: monospace;
}
.modal-input {
  margin: 0 16px 10px; padding: 12px 14px;
  background: var(--editorbg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px;
  outline: none; width: calc(100% - 32px);
}
.modal-input:focus { border-color: var(--primary); }

.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2); color: var(--text);
  padding: 10px 20px; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty-state { text-align: center; padding: 60px 24px; color: var(--text2); }
.empty-state .emoji { font-size: 60px; margin-bottom: 18px; }
.empty-state p { font-size: 20px; line-height: 1.6; }

/* ダイス */
.dice-set-btn {
  padding: 8px 14px;
  background: rgba(108,140,255,0.1);
  border: 1px solid rgba(108,140,255,0.3);
  border-radius: 8px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.dice-set-btn:hover {
  background: rgba(108,140,255,0.2);
}
.dice-set-btn .remove-set {
  font-size: 11px;
  color: var(--danger);
  margin-left: 4px;
  opacity: 0.7;
}
.dice-set-btn .remove-set:hover {
  opacity: 1;
}

/* モバイル */
@media (max-width: 767px) {
  .app-container { display: flex; height: 100dvh; }
  .toolbar {
    width: var(--toolbar-w); min-width: var(--toolbar-w);
    flex-shrink: 0; transition: width 0.3s, min-width 0.3s, opacity 0.3s;
  }
  .app-container:has(.sidebar:not(.collapsed)) .toolbar {
    width: 0; min-width: 0; padding: 0; border: none;
    overflow: hidden; opacity: 0; pointer-events: none;
  }
  .sidebar { width: 0; flex: 1; transition: flex 0.3s, width 0.3s; }
  .sidebar.collapsed { flex: 0; width: 0; min-width: 0; border-right: none; overflow: hidden; }
  .sidebar:not(.collapsed) { flex: 1; width: auto; }
  .sidebar:not(.collapsed) ~ .editor-view { flex: 0; width: 0; min-width: 0; overflow: hidden; }
  .sidebar.collapsed ~ .editor-view { flex: 1; }
}

/* PC */
@media (min-width: 768px) {
  .toolbar.pc-hidden { width: 0; min-width: 0; padding: 0; border: none; overflow: hidden; opacity: 0; }
  .sidebar { width: 420px; min-width: 380px; }
  .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
  .sidebar-close-btn { display: flex; }
  .editor-view { flex: 1; }
  .toolbar {
    width: 72px;
    min-width: 72px;
  }
  .toolbar-btn {
    width: 54px;
    height: 54px;
    font-size: 32px;
    border-radius: 16px;
  }
  .toolbar-sep {
    width: 48px;
    margin: 4px 0;
  }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app-container">
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" onclick="toggleSidebar()" title="サイドバー開閉">☰</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn primary" onclick="createMemo()" title="新規メモ">＋</button>
    <button class="toolbar-btn" id="tbCopy" onclick="copyCurrentMemo()" title="コピー">📋</button>
    <button class="toolbar-btn danger" onclick="deleteCurrent()" title="削除">🗑</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="openDataModal()" title="データ管理">💾</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="openDiceModal()" title="ダイスロール">🎲</button>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="header">
        <h1>🎲DiceTextManager</h1>
        <button class="btn-icon sidebar-close-btn" onclick="toggleSidebar()" title="サイドバーを閉じる">✕</button>
    </div>
    <div class="tree-container" id="treeContainer"></div>
    <div class="search-bar">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="メモを検索..." oninput="renderTree()">
      </div>
    </div>
    <div class="bottom-buttons">
      <button class="fab-sm" onclick="createMemo()" title="新規メモ">＋</button>
      <button class="btn-bot" onclick="createFolder()" title="新規フォルダ">📁</button>
      <button class="btn-bot" id="tbCopy" onclick="copyCurrentMemo()" title="コピー">📋</button>
      <button class="btn-bot danger-fab" onclick="deleteCurrent()" title="削除">🗑</button>
      <button class="btn-bot" onclick="openDataModal()" title="データ管理">💾</button>
      <button class="btn-bot" onclick="openDiceModal()" title="ダイスロール">🎲</button>
    </div>
  </div>

  <div class="editor-view" id="editorView">
    <div class="editor-empty" id="editorEmpty">
      <div class="emoji">📝</div>
      <p>新しくメモを作成するか、<br>メモを開いてください</p>
    </div>
    <div id="editorFolderInfo" style="display:none;">
      <div class="editor-folder-info">
        <div class="folder-big-icon">📁</div>

<script>
const STORAGE_KEY='DiceTextManager';
let memos=[],folders=[];
let currentId=null,selectedFolderId=null;
let navStack=[],renamingFolderId=null;
let expandedFolders=new Set();
let sidebarOpen=true;
let dragInfo=null,ghostEl=null;
let longPressTimer=null,longPressItem=null;
let pressStartX=0,pressStartY=0;
let isDragging=false;
const LONG_PRESS_MS=300;
const MOVE_THRESHOLD=8;

function loadData(){
  try{const r=localStorage.getItem(STORAGE_KEY);
    if(r){const d=JSON.parse(r);memos=d.memos||[];folders=d.folders||[];}}catch(e){memos=[];folders=[];}
  memos.forEach(m=>{
    if(!m.childLinks&&m.links)m.childLinks=[...m.links];
    if(!m.childLinks)m.childLinks=[];
    if(m.folderId===undefined)m.folderId=null;
    if(m.order===undefined)m.order=0;});
  try{const e=localStorage.getItem(STORAGE_KEY+'_expanded');if(e)expandedFolders=new Set(JSON.parse(e));}catch(e){}
  try{const s=localStorage.getItem(STORAGE_KEY+'_sidebar');if(s!==null)sidebarOpen=s==='1';}catch(e){}
}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify({memos,folders}));}
function saveExpanded(){localStorage.setItem(STORAGE_KEY+'_expanded',JSON.stringify([...expandedFolders]));}
function saveSidebarState(){localStorage.setItem(STORAGE_KEY+'_sidebar',sidebarOpen?'1':'0');}

function getMemo(id){return memos.find(m=>m.id===id);}
function getFolder(id){return folders.find(f=>f.id===id);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getParentMemos(mid){return memos.filter(m=>(m.childLinks||[]).includes(mid));}
function getSubFolders(pid){return folders.filter(f=>(f.parentId||null)===pid).sort((a,b)=>(a.order||0)-(b.order||0));}
function getMemosInFolder(fid){return memos.filter(m=>(m.folderId||null)===fid).sort((a,b)=>(a.order||0)-(b.order||0));}
function countItemsInFolder(fid){let c=getMemosInFolder(fid).length;getSubFolders(fid).forEach(sf=>c+=countItemsInFolder(sf.id));return c;}
function isDescendant(fid,aid){let id=fid;while(id){if(id===aid)return true;const f=getFolder(id);id=f?(f.parentId||null):null;}return false;}
function isMobile(){return window.innerWidth<768;}
function getTargetFolderId(){
  if(selectedFolderId)return selectedFolderId;
  if(currentId){const m=getMemo(currentId);if(m)return m.folderId||null;}
  return null;
}
function collectMemosInFolder(fid){let r=[...getMemosInFolder(fid)];getSubFolders(fid).forEach(sf=>{r=r.concat(collectMemosInFolder(sf.id));});return r;}
function collectSubFolders(fid){let r=[];getSubFolders(fid).forEach(sf=>{r.push(sf);r=r.concat(collectSubFolders(sf.id));});return r;}

function toggleSidebar(){sidebarOpen=!sidebarOpen;applySidebar();saveSidebarState();}
function applySidebar(){
  const sb=document.getElementById('sidebar'),tb=document.getElementById('toolbar');
  if(sidebarOpen)sb.classList.remove('collapsed');else sb.classList.add('collapsed');
  if(!isMobile()){if(sidebarOpen)tb.classList.add('pc-hidden');else tb.classList.remove('pc-hidden');}
}

function showEditorEmpty(){
  document.getElementById('editorEmpty').style.display='flex';
  document.getElementById('editorFolderInfo').style.display='none';
  document.getElementById('editorContent').style.display='none';
}
function showEditorMemo(){
  document.getElementById('editorEmpty').style.display='none';
  document.getElementById('editorFolderInfo').style.display='none';
  const c=document.getElementById('editorContent');
  c.style.display='flex';c.style.flexDirection='column';c.style.flex='1';
}
function showEditorFolder(fid){
  document.getElementById('editorEmpty').style.display='none';
  const fi=document.getElementById('editorFolderInfo');
  fi.style.display='flex';fi.style.flex='1';
  document.getElementById('editorContent').style.display='none';
  const f=getFolder(fid);if(!f)return;
  document.getElementById('folderInfoName').textContent=f.name;
  document.getElementById('folderInfoCount').textContent=`${countItemsInFolder(fid)} アイテム`;
}

function renderTree(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const container=document.getElementById('treeContainer');
  if(q){
    const filtered=memos.filter(m=>m.title.toLowerCase().includes(q)||m.text.toLowerCase().includes(q)).sort((a,b)=>b.updated-a.updated);
    container.innerHTML=filtered.length===0
      ?'<div class="empty-state"><div class="emoji">🔍</div><p>見つかりませんでした</p></div>'
      :filtered.map(m=>renderTreeMemo(m)).join('');
    return;
  }
  const html=renderTreeLevel(null);
  container.innerHTML=html||'<div class="empty-state"><div class="emoji">📂</div><p>＋ でメモを、📁 でフォルダを作成</p></div>';
}
function renderTreeLevel(parentId){
  const subs=getSubFolders(parentId),items=getMemosInFolder(parentId);
  if(!subs.length&&!items.length)return'';
  let html='';
  subs.forEach(f=>{
    const isOpen=expandedFolders.has(f.id),cnt=countItemsInFolder(f.id),isSel=selectedFolderId===f.id;
    html+=`<div class="tree-item" data-type="folder" data-id="${f.id}">
      <div class="tree-folder-row${isSel?' selected':''}">
        <div class="tree-toggle ${isOpen?'open':''}" data-toggle="${f.id}">▶</div>
        <span class="tree-folder-icon">${isOpen?'📂':'📁'}</span>
        <span class="tree-folder-name">${escHtml(f.name)}</span>
        <span class="tree-folder-count">${cnt}</span>
      </div>
      ${isOpen?`<div class="tree-children">${renderTreeLevel(f.id)}</div>`:''}
    </div>`;
  });
  items.forEach(m=>{html+=renderTreeMemo(m);});
  return html;
}
function renderTreeMemo(m){
  const cC=(m.childLinks||[]).length,pC=getParentMemos(m.id).length,isA=m.id===currentId;
  return`<div class="tree-item" data-type="memo" data-id="${m.id}">
    <div class="tree-memo-row${isA?' active':''}">
      <span class="tree-memo-icon">📄</span>
      <span class="tree-memo-title">${escHtml(m.title)||'無題のメモ'}</span>
      <div class="tree-memo-badges">
        ${pC?`<span class="tree-badge parent">⬆${pC}</span>`:''}
        ${cC?`<span class="tree-badge child">⬇${cC}</span>`:''}
      </div>
    </div>
  </div>`;
}

function toggleFolderExpand(fid){
  if(expandedFolders.has(fid))expandedFolders.delete(fid);
  else expandedFolders.add(fid);
  saveExpanded();renderTree();
}
function selectFolder(fid){
  currentId=null;navStack=[];selectedFolderId=fid;
  showEditorFolder(fid);renderTree();
  if(isMobile()){sidebarOpen=false;applySidebar();saveSidebarState();}
}
function renameFolderFromEditor(){if(selectedFolderId)openRenameFolderModal(selectedFolderId);}
function deleteFolderFromEditor(){if(!selectedFolderId)return;renamingFolderId=selectedFolderId;deleteFolder();}

// ===== 長押しドラッグシステム =====
function getPos(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function getEndPos(e){return e.changedTouches?{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY}:{x:e.clientX,y:e.clientY};}

function onPointerDown(e){
  if(isDragging)return;
  // トグルボタンのクリックは即座に処理
  const toggle=e.target.closest('[data-toggle]');
  if(toggle){e.preventDefault();toggleFolderExpand(toggle.dataset.toggle);return;}
  const ti=e.target.closest('.tree-item');
  if(!ti)return;
  const pos=getPos(e);
  pressStartX=pos.x;pressStartY=pos.y;
  longPressItem=ti;
  // 長押しタイマー開始
  longPressTimer=setTimeout(()=>{
    if(!longPressItem)return;
    startDrag(longPressItem,pos.x,pos.y);
  },LONG_PRESS_MS);
}

function onPointerMove(e){
  if(isDragging){
    e.preventDefault();
    const pos=getPos(e);
    moveDrag(pos.x,pos.y);
    return;
  }
  // 長押し判定中に動いたらキャンセル
  if(longPressTimer){
    const pos=getPos(e);
    const dx=Math.abs(pos.x-pressStartX),dy=Math.abs(pos.y-pressStartY);
    if(dx>MOVE_THRESHOLD||dy>MOVE_THRESHOLD){
      clearTimeout(longPressTimer);longPressTimer=null;
      if(longPressItem)longPressItem.classList.remove('long-press-active');
      longPressItem=null;
    }
  }
}

function onPointerUp(e){
  // 長押しタイマーをクリア
  if(longPressTimer){
    clearTimeout(longPressTimer);longPressTimer=null;
  }
  if(longPressItem)longPressItem.classList.remove('long-press-active');

  if(isDragging){
    const pos=getEndPos(e);
    endDrag(pos.x,pos.y);
    return;
  }

  // 通常クリック処理
  if(!longPressItem)return;
  const ti=longPressItem;
  longPressItem=null;
  const type=ti.dataset.type,id=ti.dataset.id;
  if(type==='folder')selectFolder(id);
  else if(type==='memo')openMemo(id);
}

function startDrag(ti,x,y){
  isDragging=true;
  longPressItem=null;
  dragInfo={el:ti,type:ti.dataset.type,id:ti.dataset.id};
  ti.classList.add('dragging');
  ti.classList.remove('long-press-active');
  ghostEl=document.createElement('div');
  ghostEl.className='drag-ghost';
  let icon,label;
  if(dragInfo.type==='folder'){
    const f=getFolder(dragInfo.id);icon='📁';label=f?f.name:'フォルダ';
  }else{
    const m=getMemo(dragInfo.id);icon='📄';label=m?(m.title||'無題のメモ'):'メモ';
  }
  ghostEl.innerHTML=`<span>${icon}</span><span>${escHtml(label)}</span>`;
  document.body.appendChild(ghostEl);
  ghostEl.style.left=(x+12)+'px';ghostEl.style.top=(y-20)+'px';
}

function moveDrag(x,y){
  if(!dragInfo)return;
  if(ghostEl){ghostEl.style.left=(x+12)+'px';ghostEl.style.top=(y-20)+'px';}
  clearAllDrop();
  const target=getTreeItemAt(x,y);
  if(!target||target===dragInfo.el||dragInfo.el.contains(target))return;
  const row=target.querySelector('.tree-folder-row,.tree-memo-row');
  if(!row)return;
  const rect=row.getBoundingClientRect();
  const zone=(y-rect.top)/rect.height;
  if(target.dataset.type==='folder'){
    if(zone<0.25)target.classList.add('drop-above');
    else if(zone>0.75)target.classList.add('drop-below');
    else target.classList.add('drop-into');
  }else{
    if(zone<0.5)target.classList.add('drop-above');
    else target.classList.add('drop-below');
  }
}

function endDrag(x,y){
  if(!dragInfo){isDragging=false;return;}
  const target=getTreeItemAt(x,y);
  if(target&&target!==dragInfo.el&&!dragInfo.el.contains(target)){
    const row=target.querySelector('.tree-folder-row,.tree-memo-row');
    if(row){const rect=row.getBoundingClientRect();executeDrop(target,(y-rect.top)/rect.height);}
  }
  dragInfo.el.classList.remove('dragging');
  clearAllDrop();
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  dragInfo=null;isDragging=false;
}

function getTreeItemAt(x,y){
  const els=document.elementsFromPoint(x,y);
  for(const el of els){
    const ti=el.closest('.tree-item');
    if(ti&&dragInfo&&ti!==dragInfo.el&&!dragInfo.el.contains(ti))return ti;
  }
  return null;
}

function clearAllDrop(){
  document.querySelectorAll('.drop-above,.drop-below,.drop-into').forEach(el=>
    el.classList.remove('drop-above','drop-below','drop-into'));
}

function executeDrop(target,zone){
  const sT=dragInfo.type,sI=dragInfo.id,dT=target.dataset.type,dI=target.dataset.id;
  if(dT==='folder'&&zone>=0.25&&zone<=0.75){
    if(sT==='folder'&&sI===dI)return;
    if(sT==='folder'&&isDescendant(dI,sI)){showToast('子フォルダ内には移動できません');return;}
    if(sT==='memo'){const m=getMemo(sI);if(m){m.folderId=dI;m.order=getMemosInFolder(dI).length+1;}}
    else{const f=getFolder(sI);if(f){f.parentId=dI;f.order=getSubFolders(dI).length+1;}}
    if(!expandedFolders.has(dI)){expandedFolders.add(dI);saveExpanded();}
    saveData();renderTree();showToast('移動しました');return;
  }
  const ib=dT==='folder'?zone<0.25:zone<0.5;
  let tp=null;
  if(dT==='folder'){const df=getFolder(dI);tp=df?(df.parentId||null):null;}
  else{const dm=getMemo(dI);tp=dm?(dm.folderId||null):null;}
  if(sT==='folder'){const sf=getFolder(sI);if(sf){if(isDescendant(tp,sI)){showToast('子フォルダ内には移動できません');return;}sf.parentId=tp;}}
  else{const sm=getMemo(sI);if(sm)sm.folderId=tp;}
  let combined=[...getSubFolders(tp).map(f=>({t:'folder',id:f.id,item:f})),...getMemosInFolder(tp).map(m=>({t:'memo',id:m.id,item:m}))];
  const si=combined.findIndex(c=>c.t===sT&&c.id===sI);let se;
  if(si!==-1)[se]=combined.splice(si,1);
  else se=sT==='folder'?{t:'folder',id:sI,item:getFolder(sI)}:{t:'memo',id:sI,item:getMemo(sI)};
  let di=combined.findIndex(c=>c.t===dT&&c.id===dI);
  if(di===-1)combined.push(se);else{if(!ib)di++;combined.splice(di,0,se);}
  let fo=0,mo=0;combined.forEach(c=>{if(c.t==='folder')c.item.order=++fo;else c.item.order=++mo;});
  saveData();renderTree();
}

// イベント登録
document.addEventListener('mousedown',onPointerDown);
document.addEventListener('mousemove',onPointerMove);
document.addEventListener('mouseup',onPointerUp);
document.addEventListener('touchstart',onPointerDown,{passive:false});
document.addEventListener('touchmove',onPointerMove,{passive:false});
document.addEventListener('touchend',onPointerUp);

// ===== フォルダ =====
function createFolder(){
  document.getElementById('folderModal').classList.add('open');
  document.getElementById('folderNameInput').value='';
  setTimeout(()=>document.getElementById('folderNameInput').focus(),300);
}
function closeFolderModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('folderModal').classList.remove('open');}
function confirmCreateFolder(){
  const name=document.getElementById('folderNameInput').value.trim();
  if(!name){showToast('フォルダ名を入力してください');return;}
  const pid=getTargetFolderId(),mx=getSubFolders(pid).reduce((m,f)=>Math.max(m,f.order||0),0);
  folders.push({id:genId(),name,parentId:pid,order:mx+1});
  if(pid&&!expandedFolders.has(pid)){expandedFolders.add(pid);saveExpanded();}
  saveData();closeFolderModal();renderTree();
  showToast(`フォルダ「${name}」を作成しました`);
}
function openRenameFolderModal(fid){
  renamingFolderId=fid;const f=getFolder(fid);if(!f)return;
  document.getElementById('renameFolderInput').value=f.name;
  document.getElementById('renameFolderModal').classList.add('open');
  setTimeout(()=>document.getElementById('renameFolderInput').focus(),300);
}
function closeRenameFolderModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('renameFolderModal').classList.remove('open');renamingFolderId=null;}
function confirmRenameFolder(){
  const name=document.getElementById('renameFolderInput').value.trim();
  if(!name){showToast('フォルダ名を入力してください');return;}
  const f=getFolder(renamingFolderId);if(f){f.name=name;saveData();}
  closeRenameFolderModal();renderTree();
  if(selectedFolderId===renamingFolderId)showEditorFolder(selectedFolderId);
}
function deleteFolder(){
  if(!renamingFolderId)return;
  const f=getFolder(renamingFolderId);if(!f)return;
  const allMemos=collectMemosInFolder(renamingFolderId);
  const allFolders=collectSubFolders(renamingFolderId);
  if(!confirm(`フォルダ「${f.name}」を削除しますか？\n中のフォルダ(${allFolders.length}件)とメモ(${allMemos.length}件)も全て削除されます。`))return;
  const memoIds=new Set(allMemos.map(m=>m.id));
  memos.forEach(m=>{m.childLinks=(m.childLinks||[]).filter(l=>!memoIds.has(l));});
  memos=memos.filter(m=>!memoIds.has(m.id));
  const folderIds=new Set([renamingFolderId,...allFolders.map(sf=>sf.id)]);
  folders=folders.filter(x=>!folderIds.has(x.id));
  if(currentId&&memoIds.has(currentId)){currentId=null;navStack=[];}
  if(selectedFolderId&&folderIds.has(selectedFolderId)){selectedFolderId=null;}
  saveData();closeRenameFolderModal();showEditorEmpty();renderTree();
  showToast('フォルダと中身を削除しました');
}

// ===== メモ =====
function createMemo(){
  const tf=getTargetFolderId(),mx=getMemosInFolder(tf).reduce((m,x)=>Math.max(m,x.order||0),0);
  const memo={id:genId(),title:'',text:'',childLinks:[],folderId:tf,order:mx+1,created:Date.now(),updated:Date.now()};
  memos.push(memo);saveData();navStack=[];
  if(tf&&!expandedFolders.has(tf)){expandedFolders.add(tf);saveExpanded();}
  openMemo(memo.id);
}
function openMemo(id,pushToStack=true){
  if(pushToStack&&currentId&&currentId!==id)navStack.push(currentId);
  currentId=id;selectedFolderId=null;
  const memo=getMemo(id);if(!memo)return;
  showEditorMemo();
  document.getElementById('editorTitle').value=memo.title;
  document.getElementById('editorText').value=memo.text;
  renderLinks();renderBreadcrumb();renderTree();
  if(isMobile()){sidebarOpen=false;applySidebar();saveSidebarState();}
}
function saveCurrent(){
  if(!currentId)return;
  const memo=getMemo(currentId);if(!memo)return;
  memo.title=document.getElementById('editorTitle').value;
  memo.text=document.getElementById('editorText').value;
  memo.updated=Date.now();saveData();renderTree();
}
function deleteCurrent(){
  if(currentId){
    if(!confirm('このメモを削除しますか？'))return;
    const id=currentId;
    memos.forEach(m=>{m.childLinks=(m.childLinks||[]).filter(l=>l!==id);});
    memos=memos.filter(m=>m.id!==id);
    saveData();currentId=null;navStack=[];
    showEditorEmpty();renderTree();showToast('メモを削除しました');return;
  }
  if(selectedFolderId){
    const f=getFolder(selectedFolderId);if(!f)return;
    const allMemos=collectMemosInFolder(selectedFolderId);
    const allFolders=collectSubFolders(selectedFolderId);
    if(!confirm(`フォルダ「${f.name}」を削除しますか？\n中のフォルダ(${allFolders.length}件)とメモ(${allMemos.length}件)も全て削除されます。`))return;
    const memoIds=new Set(allMemos.map(m=>m.id));
    memos.forEach(m=>{m.childLinks=(m.childLinks||[]).filter(l=>!memoIds.has(l));});
    memos=memos.filter(m=>!memoIds.has(m.id));
    const folderIds=new Set([selectedFolderId,...allFolders.map(sf=>sf.id)]);
    folders=folders.filter(x=>!folderIds.has(x.id));
    selectedFolderId=null;
    saveData();showEditorEmpty();renderTree();showToast('フォルダと中身を削除しました');return;
  }
  showToast('削除する対象がありません');
}

function openDiceModal() {
  if (!currentId) { showToast('メモを開いてください'); return; }
  document.getElementById('diceModal').classList.add('open');
  
  const lastCount = localStorage.getItem('dice_last_count');
  const lastFaces = localStorage.getItem('dice_last_faces');
  
  const countInput = document.getElementById('diceCount');
  const facesInput = document.getElementById('diceFaces');
  
  countInput.value = lastCount || 1;
  facesInput.value = lastFaces || 6;
  
  updateDicePreview();
  renderDiceSets();
  
  countInput.removeEventListener('input', updateDicePreview);
  facesInput.removeEventListener('input', updateDicePreview);
  countInput.addEventListener('input', updateDicePreview);
  facesInput.addEventListener('input', updateDicePreview);
}

function closeDiceModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('diceModal').classList.remove('open');
}

function updateDicePreview() {
  let a = parseInt(document.getElementById('diceCount').value) || 1;
  let b = parseInt(document.getElementById('diceFaces').value) || 6;
  if (a < 1) a = 1; else if (a > 10) a = 10;
  if (b < 1) b = 1; else if (b > 9999) b = 9999;
  document.getElementById('dicePreview').textContent = `dice${a}d${b}=`;
}

function rollDice() {
  if (!currentId) { showToast('メモを開いてください'); return; }
  let a = parseInt(document.getElementById('diceCount').value) || 1;
  let b = parseInt(document.getElementById('diceFaces').value) || 6;

  if (a < 1) a = 1; else if (a > 10) a = 10;
  if (b < 1) b = 1; else if (b > 9999) b = 9999;

  const text = `dice${a}d${b}=`;

  const ta = document.getElementById('editorText');
  
  // カーソル位置を取得、0の場合（未フォーカス）のみ末尾に追加
  let pos = ta.selectionStart || 0;
  if (pos === 0 && ta.value.length > 0 && document.activeElement !== ta) {
    pos = ta.value.length;
  }
  
  const before = ta.value.substring(0, pos);
  const after = ta.value.substring(pos);
  const insert = text;
  ta.value = before + insert + after;
  ta.selectionStart = ta.selectionEnd = pos + insert.length;
  
  ta.focus();

  saveCurrent();
  closeDiceModal();
  showToast(`${text} を追加しました`);

  localStorage.setItem('dice_last_count', a);
  localStorage.setItem('dice_last_faces', b);
}

const DICE_SETS_KEY = 'dice_sets';
const MAX_DICE_SETS = 5;

function loadDiceSets() {
  try {
    const raw = localStorage.getItem(DICE_SETS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) {
    return [];
  }
}

function saveDiceSets(sets) {
  localStorage.setItem(DICE_SETS_KEY, JSON.stringify(sets));
}

function renderDiceSets() {
  const sets = loadDiceSets();
  const container = document.getElementById('diceSets');
  
  if (sets.length === 0) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px;">保存されたセットはありません</div>';
    return;
  }
  
  container.innerHTML = sets.map((set, index) => `
    <button class="dice-set-btn" onclick="applyDiceSet(${set.count}, ${set.faces})">
      🎲 ${set.count}d${set.faces}
      <span class="remove-set" onclick="event.stopPropagation();removeDiceSet(${index})">✕</span>
    </button>
  `).join('');
}

function applyDiceSet(count, faces) {
  document.getElementById('diceCount').value = count;
  document.getElementById('diceFaces').value = faces;
  updateDicePreview();
}

function saveDiceSet() {
  let a = parseInt(document.getElementById('diceCount').value) || 1;
  let b = parseInt(document.getElementById('diceFaces').value) || 6;
  
  if (a < 1) a = 1; else if (a > 10) a = 10;
  if (b < 1) b = 1; else if (b > 9999) b = 9999;
  
  const sets = loadDiceSets();
  
  // 重複チェック
  const exists = sets.some(s => s.count === a && s.faces === b);
  if (exists) {
    showToast('このセットは既に保存されています');
    return;
  }
  
  // 最大数チェック
  if (sets.length >= MAX_DICE_SETS) {
    showToast('最大5個まで保存できます（古いものを削除してください）');
    return;
  }
  
  sets.push({ count: a, faces: b });
  saveDiceSets(sets);
  renderDiceSets();
  showToast(`${a}d${b} を保存しました`);
}

function removeDiceSet(index) {
  const sets = loadDiceSets();
  sets.splice(index, 1);
  saveDiceSets(sets);
  renderDiceSets();
  showToast('セットを削除しました');
}

function copyCurrentMemo(){
  if(!currentId){showToast('コピーするメモがありません');return;}
  const memo=getMemo(currentId);if(!memo)return;
  const content=(memo.text||'');
  navigator.clipboard.writeText(content).then(()=>onCopySuccess())
  .catch(()=>{const ta=document.createElement('textarea');ta.value=content;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);onCopySuccess();});
}
function onCopySuccess(){
  const btn=document.getElementById('tbCopy');
  if(btn){btn.classList.add('copied');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋';},1500);}
  showToast('コピーしました');
}

function renderLinks() {
  const memo = getMemo(currentId);
  if (!memo) return;
  const parents = getParentMemos(currentId);
  document.getElementById('parentLinks').innerHTML = parents.length === 0
    ? '<div class="no-links">親リンクなし</div>'
    : parents.map(p => `<div class="linked-memo-item">
        <span class="lm-icon" style="color:var(--warning)">⬆</span>
        <span class="lm-title" onclick="navigateToLink('${p.id}')">${escHtml(p.title || '無題のメモ')}</span>
        <button class="lm-remove" onclick="event.stopPropagation();removeParentLink('${p.id}')">✕</button>
      </div>`).join('');
  const children = (memo.childLinks || []).map(id => getMemo(id)).filter(Boolean);
  document.getElementById('childLinks').innerHTML = children.length === 0
    ? '<div class="no-links">子リンクなし</div>'
    : children.map(c => `<div class="linked-memo-item">
        <span class="lm-icon" style="color:var(--primary)">⬇</span>
        <span class="lm-title" onclick="navigateToLink('${c.id}')">${escHtml(c.title || '無題のメモ')}</span>
        <button class="lm-remove" onclick="event.stopPropagation();removeChildLink('${c.id}')">✕</button>
      </div>`).join('');
}
function navigateToLink(id){openMemo(id,true);}
function removeChildLink(lid){const memo=getMemo(currentId);if(!memo)return;memo.childLinks=(memo.childLinks||[]).filter(l=>l!==lid);saveData();renderLinks();renderTree();}
function removeParentLink(parentId) {
  const parentMemo = getMemo(parentId);
  if (!parentMemo) return;
  parentMemo.childLinks = (parentMemo.childLinks || []).filter(l => l !== currentId);
  saveData();
  renderLinks();
  renderTree();
}

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  if(navStack.length===0){bc.innerHTML='';return;}
  let html='';
  navStack.forEach((id,i)=>{const m=getMemo(id);if(!m)return;html+=`<span onclick="goBackTo(${i})">${escHtml(m.title||'無題')}</span><span class="sep">›</span>`;});
  const cur=getMemo(currentId);
  if(cur)html+=`<span class="current">${escHtml(cur.title||'無題')}</span>`;
  bc.innerHTML=html;bc.scrollLeft=bc.scrollWidth;
}
function goBackTo(i){const id=navStack[i];navStack=navStack.slice(0,i);openMemo(id,false);}

function openLinkModal(){
  document.getElementById('linkModal').classList.add('open');
  document.getElementById('linkSearch').value='';renderLinkList();
  setTimeout(()=>document.getElementById('linkSearch').focus(),300);
}
function closeLinkModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('linkModal').classList.remove('open');}
function renderLinkList(){
  const memo=getMemo(currentId);if(!memo)return;
  const q=document.getElementById('linkSearch').value.toLowerCase();
  let av=memos.filter(m=>m.id!==currentId);
  if(q)av=av.filter(m=>m.title.toLowerCase().includes(q)||m.text.toLowerCase().includes(q));
  av.sort((a,b)=>b.updated-a.updated);
  const cc=new Set(memo.childLinks||[]);
  document.getElementById('linkList').innerHTML=av.map(m=>{
    if(cc.has(m.id))return`<div class="modal-item already-linked"><span class="mi-icon">🔗</span><span class="mi-title">${escHtml(m.title||'無題のメモ')}</span><span class="mi-status">追加済み</span></div>`;
    return`<div class="modal-item" onclick="addChildLink('${m.id}')"><span class="mi-icon">📄</span><span class="mi-title">${escHtml(m.title||'無題のメモ')}</span></div>`;
  }).join('')||'<div class="no-links">他のメモがありません</div>';
}
function addChildLink(lid){
  const memo=getMemo(currentId);if(!memo)return;
  if(!memo.childLinks)memo.childLinks=[];
  if(memo.childLinks.includes(lid))return;
  memo.childLinks.push(lid);memo.updated=Date.now();
  saveData();renderLinkList();renderLinks();renderTree();
  const o=getMemo(lid);showToast(`「${o?.title||'無題'}」を子リンクに追加`);
}

function openParentLinkModal() {
  document.getElementById('parentLinkModal').classList.add('open');
  document.getElementById('parentLinkSearch').value = '';
  renderParentLinkList();
  setTimeout(() => document.getElementById('parentLinkSearch').focus(), 300);
}

function closeParentLinkModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('parentLinkModal').classList.remove('open');
}

function renderParentLinkList() {
  const memo = getMemo(currentId);
  if (!memo) return;
  const q = document.getElementById('parentLinkSearch').value.toLowerCase();
  let av = memos.filter(m => m.id !== currentId);
  if (q) av = av.filter(m => m.title.toLowerCase().includes(q) || m.text.toLowerCase().includes(q));
  av.sort((a, b) => b.updated - a.updated);
  
  // 既に親リンクになっているメモ（このメモをchildLinksに持つメモ）
  const currentParents = new Set(getParentMemos(currentId).map(m => m.id));
  
  document.getElementById('parentLinkList').innerHTML = av.map(m => {
    if (currentParents.has(m.id)) {
      return `<div class="modal-item already-linked"><span class="mi-icon">🔗</span><span class="mi-title">${escHtml(m.title || '無題のメモ')}</span><span class="mi-status">追加済み</span></div>`;
    }
    return `<div class="modal-item" onclick="addParentLink('${m.id}')"><span class="mi-icon">📄</span><span class="mi-title">${escHtml(m.title || '無題のメモ')}</span></div>`;
  }).join('') || '<div class="no-links">他のメモがありません</div>';
}

function addParentLink(parentId) {
  const parentMemo = getMemo(parentId);
  if (!parentMemo) return;
  if (!parentMemo.childLinks) parentMemo.childLinks = [];
  if (parentMemo.childLinks.includes(currentId)) return;
  
  parentMemo.childLinks.push(currentId);
  parentMemo.updated = Date.now();
  saveData();
  renderParentLinkList();
  renderLinks();
  renderTree();
  showToast(`「${parentMemo.title || '無題'}」を親リンクに追加`);
}

function openDataModal(){
  document.getElementById('dataModal').classList.add('open');
  document.getElementById('dataActions').style.display='';
  document.getElementById('importArea').style.display='none';
}
function closeDataModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('dataModal').classList.remove('open');}
function exportData(){
  const json=JSON.stringify({memos,folders},null,2);
  navigator.clipboard.writeText(json).then(()=>{showToast('クリップボードにコピーしました');closeDataModal();})
  .catch(()=>{const ta=document.createElement('textarea');ta.value=json;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('クリップボードにコピーしました');closeDataModal();});
}
function exportFile(){
  const json=JSON.stringify({memos,folders},null,2);
  const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`DTM_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);showToast('ファイルに保存しました');closeDataModal();
}
function showImportText(){document.getElementById('dataActions').style.display='none';document.getElementById('importArea').style.display='';document.getElementById('importTextarea').value='';}
function hideImportText(){document.getElementById('dataActions').style.display='';document.getElementById('importArea').style.display='none';}
function doImport(data){
  if(Array.isArray(data)){memos=data;folders=[];}
  else if(data.memos){memos=data.memos||[];folders=data.folders||[];}
  else throw new Error();
  memos.forEach(m=>{if(!m.childLinks&&m.links)m.childLinks=[...m.links];if(!m.childLinks)m.childLinks=[];if(m.folderId===undefined)m.folderId=null;if(m.order===undefined)m.order=0;});
  saveData();currentId=null;selectedFolderId=null;navStack=[];
  showEditorEmpty();renderTree();closeDataModal();
  showToast(`${memos.length}件のメモを読み込みました`);
}
function importFromText(){
  const raw=document.getElementById('importTextarea').value.trim();
  if(!raw){showToast('データを貼り付けてください');return;}
  try{const data=JSON.parse(raw);const cnt=Array.isArray(data)?data.length:(data.memos||[]).length;
    if(!confirm(`${cnt}件を読み込みます。上書きされます。よろしいですか？`))return;doImport(data);
  }catch(e){showToast('データの形式が正しくありません');}
}
function importFile(){document.getElementById('fileInput').click();}
function handleFileImport(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){try{const data=JSON.parse(e.target.result);const cnt=Array.isArray(data)?data.length:(data.memos||[]).length;
    if(!confirm(`${cnt}件を読み込みます。上書きされます。よろしいですか？`))return;doImport(data);
  }catch(err){showToast('ファイルの形式が正しくありません');}};
  reader.readAsText(file);event.target.value='';
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadData();showEditorEmpty();applySidebar();renderTree();
</script>
